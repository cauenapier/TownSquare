<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TownSquare — walk sandbox</title>
    <link rel="stylesheet" href="/widget.css" />
  </head>
  <body class="walk-page">
    <main class="walk-shell">
      <header class="walk-toolbar" aria-label="Walk animation controls">
        <div>
          <p class="eyebrow">TownSquare sandbox</p>
          <h1>Walk cycle</h1>
        </div>

        <div class="walk-controls">
          <button class="dev-button" id="play-toggle" type="button">Pause</button>
          <button class="walk-icon-button" id="prev-frame" type="button" aria-label="Previous frame">‹</button>
          <button class="walk-icon-button" id="next-frame" type="button" aria-label="Next frame">›</button>
          <label class="dev-check">
            <input id="direction-left" type="checkbox" />
            <span>Left</span>
          </label>
        </div>
      </header>

      <section class="walk-stage" aria-label="Walking animation preview">
        <div class="walk-preview">
          <svg id="walk-figure" viewBox="0 0 20 44" preserveAspectRatio="xMidYMax meet" aria-label="Walking figure">
            <g class="figure-core">
              <circle class="head" cx="10" cy="6.2" r="3.4"></circle>
              <line x1="10" y1="10" x2="10" y2="26"></line>
              <g class="joint arm-l">
                <line x1="9.4" y1="14" x2="6.1" y2="20"></line>
                <g class="joint elbow-l">
                  <line x1="6.1" y1="20" x2="4.7" y2="26"></line>
                </g>
              </g>
              <g class="joint arm-r">
                <line x1="10.6" y1="14" x2="13.9" y2="20"></line>
                <g class="joint elbow-r">
                  <line x1="13.9" y1="20" x2="15.3" y2="26"></line>
                </g>
              </g>
              <g class="joint leg-l">
                <line x1="9.2" y1="26" x2="7.1" y2="34"></line>
                <g class="joint knee-l">
                  <line x1="7.1" y1="34" x2="5.4" y2="42"></line>
                </g>
              </g>
              <g class="joint leg-r">
                <line x1="10.8" y1="26" x2="12.9" y2="34"></line>
                <g class="joint knee-r">
                  <line x1="12.9" y1="34" x2="14.6" y2="42"></line>
                </g>
              </g>
            </g>
          </svg>
        </div>

        <div class="walk-ground"></div>
      </section>

      <section class="walk-timeline" aria-label="Frame controls">
        <label class="walk-slider">
          <span id="frame-label">Frame 0</span>
          <input id="frame-slider" type="range" min="0" max="100" step="1" value="0" />
        </label>
        <output class="walk-readout" id="pose-readout"></output>
      </section>
    </main>

    <script type="module" src="/walk-sandbox.mjs"></script>
  </body>
</html>
