<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>TownSquare — livestream overlay</title>
    <link rel="stylesheet" href="/widget.css" />
    <style>
      /* Transparent, chrome-free scene for compositing over a livestream in an
         OBS browser source. The widget mounts in "watch" mode: it renders the
         real, live crowd (peers, props, birds, chat bubbles) but never places a
         self avatar, and the server never counts the overlay as a visitor. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
      }
      body {
        overflow: hidden;
      }

      #townsquare-root {
        position: fixed;
        inset: 0;
      }

      /* Fill the frame; characters and props stay anchored near the bottom and
         speech bubbles rise into the transparent space above them. */
      #townsquare-root .townsquare {
        width: 100%;
        height: 100%;
        min-height: 0;
        background: transparent;
      }
      #townsquare-root .townsquare__stage {
        height: 100%;
        border-radius: 0;
      }

      /* The stage background stays transparent (no data-townsquare-surface), but
         keep the subtle ground shadow so avatars feel grounded over the video. */
      #townsquare-root .townsquare__ground {
        background: var(--ground);
      }

      /* Hide all interactive chrome — overlays are display-only. */
      #townsquare-root .townsquare__controls,
      #townsquare-root .townsquare__actions,
      #townsquare-root .townsquare__status,
      #townsquare-root .townsquare__toolbar {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="townsquare-root"></div>

    <script type="module">
      import { mountTownSquare } from "/townsquare.mjs";

      // Configure the overlay from the URL so a streamer can point an OBS browser
      // source at, e.g. /overlay?siteKey=abc123 (hosted) or just /overlay
      // (self-hosted, this server's own scene).
      const params = new URLSearchParams(window.location.search);
      const siteKey = params.get("siteKey") || "";
      const origin = params.get("origin") || window.location.origin;
      const theme = params.get("theme") || "dark";

      mountTownSquare(document.getElementById("townsquare-root"), {
        serverOrigin: origin,
        socketPath: "/live",
        siteKey,
        watch: true,
        theme,
      });
    </script>
  </body>
</html>
