name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (all server/plugin/public/scripts sources)
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Smoke test (spawns its own server)
        run: npm run smoke

      - name: Plugin smoke test (spawns its own server)
        run: npm run smoke:plugins
